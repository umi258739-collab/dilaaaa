<!DOCTYPE html>
<html>
<head>
    <title>Latihan Border</title>
    <style>
        .kotak {
            width: 200px;
            padding: 20px;
            margin: 10px;
        }

        .solid {
            border: 4px solid black;
        }

        .double {
            border: 6px double blue;
        }

        .groove {
            border: 6px groove green;
        }

        .ridge {
            border: 6px ridge red;
        }
    </style>
</head>
<body>

    <div class="kotak solid">Border Solid Hitam</div>
    <div class="kotak double">Border Double Biru</div>
    <div class="kotak groove">Border Groove Hijau</div>
    <div class="kotak ridge">Border Ridge Merah</div>

</body>
</html>
