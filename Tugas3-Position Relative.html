<!DOCTYPE html>
<html>
<head>
    <title>Relative - Tugas 3</title>
    <style>
        .box {
            position: relative;
            width: 100px;
            height: 100px;
        }

        .step1 {
            left: 0;
            top: 0;
            background: blue;
        }

        .step2 {
            left: 50px;
            top: 50px;
            background: green;
        }

        .step3 {
            left: 100px;
            top: 100px;
            background: red;
        }
    </style>
</head>
<body>
    <div class="box step1"></div>
    <div class="box step2"></div>
    <div class="box step3"></div>
</body>
</html>
