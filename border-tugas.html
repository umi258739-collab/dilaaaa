<!DOCTYPE html>
<html>
<head>
    <title>Praktik Border Lengkap</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .solid {
            border: 3px solid blue;
            padding: 10px;
            background-color: #e3f2fd;
        }

        .dotted {
            border: 3px dotted red;
            padding: 10px;
            background-color: #ffebee;
        }

        .double {
            border: 5px double green;
            padding: 10px;
            background-color: #e8f5e9;
        }

        .dashed {
            border: 3px dashed orange;
            padding: 10px;
            background-color: #fff3e0;
        }

        .groove {
            border: 6px groove purple;
            padding: 10px;
            background-color: #f3e5f5;
        }

        .ridge {
            border: 6px ridge brown;
            padding: 10px;
            background-color: #efebe9;
        }
    </style>
</head>
<body>

    <h2>Contoh Border CSS</h2>

    <p class="solid">Ini border solid</p>
    <p class="dotted">Ini border dotted</p>
    <p class="double">Ini border double</p>
    <p class="dashed">Ini border dashed</p>
    <p class="groove">Ini border groove</p>
    <p class="ridge">Ini border ridge</p>

</body>
</html>
