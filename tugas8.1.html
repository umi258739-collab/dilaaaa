<!DOCTYPE html>
<html>
<head>
    <title>Tugas 8.1</title>
    <style>
        h1 {
            font-size: 40px; /* menggunakan px */
        }

        p {
            font-size: 14pt; /* menggunakan pt */
        }

        .box-cm {
            width: 5cm;
            height: 3cm;
            background-color: lightcoral;
            margin-bottom: 20px;
        }

        .box-persen {
            width: 50%;
            height: 100px;
            background-color: lightblue;
        }
    </style>
</head>
<body>

    <h1>Judul Menggunakan PX</h1>

    <p>
        Ini adalah paragraf yang menggunakan satuan point (pt).
    </p>

    <div class="box-cm"></div>

    <div class="box-persen"></div>

</body>
</html>
