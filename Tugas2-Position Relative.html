<!DOCTYPE html>
<html>
<head>
    <title>Relative - Tugas 2</title>
    <style>
        .box {
            position: relative;
            width: 100px;
            height: 100px;
        }

        .box1 {
            left: 50px;
            top: 40px;
            background: blue;
        }

        .box2 {
            left: 80px;
            top: 60px;
            background: green;
        }

        .box3 {
            left: 110px;
            top: 80px;
            background: red;
        }
    </style>
</head>
<body>
    <div class="box box1"></div>
    <div class="box box2"></div>
    <div class="box box3"></div>
</body>
</html>
