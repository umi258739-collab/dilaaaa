<!DOCTYPE html>
<html>
<head>
    <title>Latihan 1</title>
    <style>
        .box1 {
            width: 200px;
            height: 200px;
            background-color: red;
            margin: 10px;
        }

        .box2 {
            width: 50%;
            height: 150px;
            background-color: blue;
            margin: 10px;
        }

        .box3 {
            width: 80vw;
            height: 30vh;
            background-color: green;
            margin: 10px;
        }
    </style>
</head>
<body>

    <div class="box1">Box 1 (200px x 200px)</div>
    <div class="box2">Box 2 (50% x 150px)</div>
    <div class="box3">Box 3 (80vw x 30vh)</div>

</body>
</html>
