<!DOCTYPE html>
<html>
<head>
    <title>Fixed - Tugas 3</title>
    <style>
        body {
            height: 2000px;
        }

        .left {
            position: fixed;
            top: 50%;
            left: 0;
            background: red;
            color: white;
            padding: 10px;
        }

        .right {
            position: fixed;
            top: 50%;
            right: 0;
            background: blue;
            color: white;
            padding: 10px;
        }
    </style>
</head>
<body>

    <div class="left">Kiri</div>
    <div class="right">Kanan</div>

    <h1>Scroll ke bawah</h1>

</body>
</html>
